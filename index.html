<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>GasoApp</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#16213e; --surface3:#1e2a45;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#f0f0f0; --text2:#8899aa;
  --accent:#e85d04; --accent2:#f48c06; --accent-dim:rgba(232,93,4,0.13); --accent-dim2:rgba(232,93,4,0.22);
  --p95:#ff9a3c; --pd:#4cc9f0;
  --top95:#22c55e; --topD:#a78bfa;
  --cheap:#52b788; --exp:#f07167;
  --r:14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* HEADER */
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(10px + var(--safe-top)) 14px 10px;display:flex;align-items:center;gap:10px;z-index:1000;flex-shrink:0;}
#logo{font-size:17px;font-weight:800;color:var(--accent);white-space:nowrap;}
#logo span{color:var(--text2);font-weight:400;}
#search-wrap{flex:1;position:relative;}
#search{width:100%;padding:10px 34px 10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;}
#search:focus{border-color:var(--accent);}
#search::placeholder{color:var(--text2);}
#clear-search{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;display:none;line-height:1;padding:0 2px;}

/* MAP */
#map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}

/* BOTTOM SHEET LIST */
#bottom-list{
  position:absolute;bottom:0;left:0;right:0;z-index:800;
  background:var(--surface);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--border2);
  box-shadow:0 -4px 30px rgba(0,0,0,.5);
  display:flex;flex-direction:column;
  transition:height .3s cubic-bezier(.4,0,.2,1);
  height:38vh;
  padding-bottom:var(--safe-bottom);
}
#list-handle-bar{padding:10px 0 6px;cursor:grab;flex-shrink:0;text-align:center;touch-action:none;}
#list-handle{width:38px;height:4px;background:var(--border2);border-radius:2px;display:inline-block;}
#list-header{padding:0 14px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:6px;}
#result-count{font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0;}

/* CUSTOM SELECT */
.custom-select{position:relative;flex:1;min-width:0;}
.cs-trigger{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12.5px;padding:7px 26px 7px 10px;border-radius:8px;width:100%;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;position:relative;}
.cs-trigger::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:11px;}
.cs-options{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface3);border:1px solid var(--border2);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:1600;max-height:220px;overflow-y:auto;display:none;}
.cs-options.open{display:block;}
.cs-opt{padding:11px 14px;font-size:13.5px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);}
.cs-opt:last-child{border-bottom:none;}
.cs-opt:active,.cs-opt.sel{background:var(--accent-dim);color:var(--accent);}

#filter-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text2);cursor:pointer;font-size:12.5px;white-space:nowrap;transition:all .2s;flex-shrink:0;display:flex;align-items:center;gap:5px;}
#filter-btn.active,#filter-btn:active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
#filter-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:none;}
#filter-dot.show{display:block;}

/* LEGEND */
#legend{padding:0 14px 8px;display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0;}
.leg{font-size:10.5px;display:flex;align-items:center;gap:4px;color:var(--text2);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

#gas-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#gas-list::-webkit-scrollbar{display:none;}

.gas-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;display:flex;align-items:center;gap:11px;}
.gas-item:active{background:var(--surface2);}
.gas-item.selected{background:var(--accent-dim2);border-left:3px solid var(--accent);}
.gas-rank{width:22px;height:22px;border-radius:7px;font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
.gas-info{flex:1;min-width:0;}
.gas-name{font-size:13.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gas-addr{font-size:11.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.gas-prices{display:flex;gap:5px;margin-top:6px;}
.price-badge{font-size:11px;padding:3px 8px;border-radius:7px;font-weight:700;}
.p95{background:rgba(255,154,60,.13);color:var(--p95);}
.pdiesel{background:rgba(76,201,240,.12);color:var(--pd);}
.top95{background:rgba(34,197,94,.2);color:var(--top95);}
.topD{background:rgba(167,139,250,.2);color:var(--topD);}
.distance-badge{font-size:11px;color:var(--text2);white-space:nowrap;flex-shrink:0;font-weight:600;}

/* DETAIL PANEL */
#detail-panel{
  position:absolute;bottom:0;left:0;right:0;z-index:900;
  background:var(--surface);border-top:1px solid var(--border2);
  border-radius:22px 22px 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.7);
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.34,1.2,.64,1);
  max-height:80vh;overflow-y:auto;
  padding-bottom:var(--safe-bottom);
}
#detail-panel.open{transform:translateY(0);}
#detail-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;line-height:1;}
#detail-handle2{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 14px;}
.detail-inner{padding:0 18px 20px;}
#detail-name{font-size:19px;font-weight:800;margin-bottom:3px;letter-spacing:-.2px;}
#detail-addr{font-size:12.5px;color:var(--text2);margin-bottom:16px;}
.detail-prices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.detail-price-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
.dpl{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;}
.dpv{font-size:26px;font-weight:800;}
.dpv.v95{color:var(--p95);}.dpv.vD{color:var(--pd);}
.detail-meta{font-size:12.5px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}

/* NAV BUTTONS — pill-style modernos */
.nav-btns{display:flex;gap:8px;}
.nav-btn{flex:1;padding:13px 6px;border-radius:14px;border:1px solid transparent;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:transform .12s,opacity .12s;}
.nav-btn:active{transform:scale(.95);opacity:.85;}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.nav-icon svg{width:100%;height:100%;}
.btn-gmaps{background:var(--surface2);color:var(--text);border-color:var(--border);}
.btn-waze{background:var(--surface2);color:var(--text);border-color:var(--border);}
.btn-copy{background:var(--surface2);color:var(--text);border-color:var(--border);}

/* FILTERS — ventana flotante centrada */
#filters-panel{position:absolute;inset:0;z-index:2000;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px;}
#filters-panel.open{display:flex;}
#filters-inner{background:var(--surface);border-radius:18px;padding:20px;width:100%;max-width:340px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);border:1px solid var(--border2);}
.filters-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.filters-title button{background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:26px;height:26px;color:var(--text2);font-size:15px;cursor:pointer;}
.filter-section{margin-bottom:16px;}
.filter-label{font-size:11px;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;height:4px;}
.range-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:4px;}
.range-val{color:var(--accent);font-weight:700;}
#set-center-btn{font-size:13px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);width:100%;margin-top:8px;text-align:center;font-weight:600;}
#set-center-btn:active{opacity:.7;}
#radio-center-info{font-size:11.5px;color:var(--accent);margin-top:8px;padding:6px 9px;background:var(--accent-dim);border-radius:8px;display:none;}
#clear-radius-btn{font-size:12px;padding:6px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--exp);display:none;margin-top:8px;width:100%;}
#apply-filters{width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
#apply-filters:active{opacity:.85;}

/* MAP CONTROLS */
#locate-btn{position:absolute;top:calc(14px + var(--safe-top));right:14px;z-index:700;background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;box-shadow:0 2px 14px rgba(0,0,0,.45);transition:all .2s;}
#locate-btn:active{transform:scale(.92);}

/* STATUS */
#status{position:absolute;top:calc(14px + var(--safe-top));left:14px;z-index:700;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 11px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;box-shadow:0 2px 14px rgba(0,0,0,.45);max-width:62%;}
#status-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--cheap);flex-shrink:0;}
.dot.loading{background:#f59e0b;animation:pulse 1s infinite;}
.dot.error{background:var(--exp);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* LOADER */
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#loader-title{font-size:28px;font-weight:800;color:var(--accent);letter-spacing:-1px;}
#loader-sub{font-size:13px;color:var(--text2);text-align:center;padding:0 36px;}
.spinner{width:44px;height:44px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* DOT MARKERS — minimalistas */
.dotm{border-radius:50%;border:2px solid #0f0f1a;box-shadow:0 0 0 2px rgba(255,255,255,.08);}
.dotm.sel{border:3px solid #fff;box-shadow:0 0 0 5px rgba(255,255,255,.18), 0 4px 14px rgba(0,0,0,.5);}

/* clusters */
.marker-cluster-small{background-color:rgba(232,93,4,.18);}
.marker-cluster-small div{background-color:rgba(232,93,4,.85);color:#fff;font-weight:800;}
.marker-cluster-medium{background-color:rgba(244,140,6,.15);}
.marker-cluster-medium div{background-color:rgba(244,140,6,.82);color:#fff;font-weight:800;}
.marker-cluster-large{background-color:rgba(76,201,240,.12);}
.marker-cluster-large div{background-color:rgba(76,201,240,.78);color:#0f0f1a;font-weight:800;}
.leaflet-container{background:#0f0f1a;}
.leaflet-tile{filter:brightness(.78) saturate(.8);}
.leaflet-control-zoom{display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">Gaso<span>App</span></div>
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Buscar gasolinera o municipio..."/>
      <button id="clear-search">×</button>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <button id="locate-btn" title="Mi ubicación">📍</button>
    <div id="status"><div class="dot loading" id="status-dot"></div><span id="status-text">Iniciando...</span></div>

    <!-- BOTTOM LIST SHEET -->
    <div id="bottom-list">
      <div id="list-handle-bar"><span id="list-handle"></span></div>
      <div id="list-header">
        <span id="result-count">—</span>

        <div class="custom-select" id="sort-select-wrap">
          <button class="cs-trigger" id="sort-trigger">Más cercanas</button>
          <div class="cs-options" id="sort-options">
            <div class="cs-opt sel" data-val="dist">Más cercanas</div>
            <div class="cs-opt" data-val="price95">Precio 95 ↑</div>
            <div class="cs-opt" data-val="priceD">Precio Diésel ↑</div>
            <div class="cs-opt" data-val="name">Nombre A-Z</div>
          </div>
        </div>

        <button id="filter-btn">⚙ Filtros<span id="filter-dot"></span></button>
      </div>
      <div id="legend">
        <div class="leg"><span class="leg-dot" style="background:var(--top95)"></span>Top4 G95</div>
        <div class="leg"><span class="leg-dot" style="background:var(--topD)"></span>Top4 Diésel</div>
      </div>
      <div id="gas-list"></div>
    </div>

    <!-- DETAIL PANEL -->
    <div id="detail-panel">
      <div id="detail-handle2"></div>
      <button id="detail-close">×</button>
      <div class="detail-inner">
        <div id="detail-name">—</div>
        <div id="detail-addr">—</div>
        <div class="detail-prices">
          <div class="detail-price-card">
            <div class="dpl">Gasolina 95</div>
            <div class="dpv v95" id="d-p95">—</div>
          </div>
          <div class="detail-price-card">
            <div class="dpl">Gasoleo A</div>
            <div class="dpv vD" id="d-pd">—</div>
          </div>
        </div>
        <div class="detail-meta">
          <span>📍 <span id="d-muni">—</span></span>
          <span>🏙 <span id="d-prov">—</span></span>
          <span id="d-dist"></span>
        </div>
        <div class="nav-btns">
          <button class="nav-btn btn-gmaps" id="btn-gmaps">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 21s7-7.58 7-12A7 7 0 0 0 5 9c0 4.42 7 12 7 12Z" stroke="#4285F4" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="9" r="2.4" fill="#4285F4"/></svg></span>
            Maps
          </button>
          <button class="nav-btn btn-waze" id="btn-waze">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="11" r="7.2" stroke="#33CCFF" stroke-width="1.8"/><circle cx="9.3" cy="10" r="1" fill="#33CCFF"/><circle cx="14.7" cy="10" r="1" fill="#33CCFF"/><path d="M9 14c.8.8 2 1.2 3 1.2s2.2-.4 3-1.2" stroke="#33CCFF" stroke-width="1.5" stroke-linecap="round"/><path d="M12 18.2V21M8 19.5l-1.2 1.8M16 19.5l1.2 1.8" stroke="#33CCFF" stroke-width="1.8" stroke-linecap="round"/></svg></span>
            Waze
          </button>
          <button class="nav-btn btn-copy" id="btn-copy">
            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="8" y="8" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2" stroke="currentColor" stroke-width="1.8"/></svg></span>
            Copiar
          </button>
        </div>
      </div>
    </div>

    <!-- FILTERS — ventana flotante -->
    <div id="filters-panel">
      <div id="filters-inner">
        <div class="filters-title">Filtros<button id="close-filters">×</button></div>

        <div class="filter-section">
          <div class="filter-label">Provincia</div>
          <div class="custom-select" id="prov-select-wrap">
            <button class="cs-trigger" id="prov-trigger">Todas</button>
            <div class="cs-options" id="prov-options"></div>
          </div>
        </div>
        <div class="filter-section">
          <div class="filter-label">Municipio</div>
          <div class="custom-select" id="muni-select-wrap">
            <button class="cs-trigger" id="muni-trigger">Todos</button>
            <div class="cs-options" id="muni-options"></div>
          </div>
        </div>
        <div class="filter-section">
          <div class="filter-label">Radio desde tu posición</div>
          <input type="range" id="radius-range" min="0" max="200" step="5" value="25"/>
          <div class="range-labels"><span>0 km</span><span class="range-val" id="radius-val">25 km</span><span>200 km</span></div>
          <button id="set-center-btn">📍 Aplicar radio desde aquí</button>
          <div id="radio-center-info"></div>
          <button id="clear-radius-btn">Quitar radio</button>
        </div>
        <div class="filter-section">
          <div class="filter-label">Precio máximo G95</div>
          <input type="range" id="max-price-95" min="1.2" max="2.5" step="0.01" value="2.5"/>
          <div class="range-labels"><span>1.20€</span><span class="range-val" id="max-price-val">Sin límite</span><span>2.50€</span></div>
        </div>
        <button id="apply-filters">Aplicar filtros</button>
      </div>
    </div>
  </div>
</div>

<div id="loader">
  <div class="spinner"></div>
  <div id="loader-title">GasoApp</div>
  <div id="loader-sub">Buscando tu posición...</div>
</div>

<script>
const CACHE_KEY='gasoapp_v5', CACHE_TS='gasoapp_ts_v5', CACHE_TTL=24*60*60*1000; // 24h cache
const API_URL='https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/';
const LOAD_RADIUS_DEFAULT=30;

let allData=[], filtered=[];
let map, clusterLayer, radiusCircle;
let markerMap={};
let userLocation=null, radiusCenter=null, radiusKm=0;
let selectedId=null;
let activeFilters={provincia:'', municipio:'', maxPrice95:2.5};
let currentSort='dist';

// ── DOT MARKER ICONS (minimalista) ─────────────────────────────────────────
function dotIcon(color, selected){
  const sz = selected ? 22 : 13;
  return L.divIcon({
    html:`<div class="dotm${selected?' sel':''}" style="width:${sz}px;height:${sz}px;background:${color};"></div>`,
    className:'',
    iconSize:[sz,sz],
    iconAnchor:[sz/2,sz/2]
  });
}

// ── MAP ──────────────────────────────────────────────────────────────────
function initMap(){
  map=L.map('map',{zoomControl:false,attributionControl:false}).setView([40.4,-3.7],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  clusterLayer=L.markerClusterGroup({chunkedLoading:true,maxClusterRadius:46,showCoverageOnHover:false,disableClusteringAtZoom:14});
  map.addLayer(clusterLayer);
  map.on('click',closeDetail);
}

// ── HELPERS ──────────────────────────────────────────────────────────────
const parsePrice=s=>(!s||!s.trim())?null:parseFloat(s.replace(',','.'));
const fmtPrice=s=>{const p=parsePrice(s);return p?p.toFixed(3)+' €':'—';};
function haversine(a,b,c,d){const R=6371,t=Math.PI/180,dl=(c-a)*t,dn=(d-b)*t,e=Math.sin(dl/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));}
function coords(g){return{lat:parseFloat((g.Latitud||'').replace(',','.')),lng:parseFloat((g['Longitud (WGS84)']||'').replace(',','.'))};}
function setStatus(t,m){document.getElementById('status-text').textContent=m;const d=document.getElementById('status-dot');d.className='dot'+(t==='loading'?' loading':t==='error'?' error':'');}
function fmtDist(d){return d<1?(d*1000).toFixed(0)+'m':d.toFixed(1)+'km';}

function getTop4(list){
  const with95=[...list].filter(g=>parsePrice(g['Precio Gasolina 95 E5'])).sort((a,b)=>parsePrice(a['Precio Gasolina 95 E5'])-parsePrice(b['Precio Gasolina 95 E5'])).slice(0,4);
  const withD=[...list].filter(g=>parsePrice(g['Precio Gasoleo A'])).sort((a,b)=>parsePrice(a['Precio Gasoleo A'])-parsePrice(b['Precio Gasoleo A'])).slice(0,4);
  return{top95ids:new Set(with95.map(g=>g.IDEESS)),topDids:new Set(withD.map(g=>g.IDEESS))};
}

// ── MARKERS ───────────────────────────────────────────────────────────────
function buildMarkers(list){
  clusterLayer.clearLayers();
  markerMap={};
  const{top95ids,topDids}=getTop4(list);
  list.forEach(g=>{
    const{lat,lng}=coords(g);
    if(isNaN(lat)||isNaN(lng))return;
    const isTop95=top95ids.has(g.IDEESS), isTopD=topDids.has(g.IDEESS);
    const color=isTop95?'#22c55e':isTopD?'#a78bfa':'#e85d04';
    const marker=L.marker([lat,lng],{icon:dotIcon(color,g.IDEESS===selectedId)});
    marker.on('click',e=>{L.DomEvent.stopPropagation(e);showDetail(g,marker);});
    clusterLayer.addLayer(marker);
    markerMap[g.IDEESS]={marker,lat,lng,color};
  });
}
function refreshMarker(id,selected){
  const m=markerMap[id];if(!m)return;
  m.marker.setIcon(dotIcon(m.color,selected));
}

// ── DETAIL ────────────────────────────────────────────────────────────────
function showDetail(g,marker){
  document.getElementById('detail-name').textContent=g['Rótulo']||'Sin nombre';
  document.getElementById('detail-addr').textContent=(g['Dirección']||'')+(g['C.P.']?', '+g['C.P.']:'');
  document.getElementById('d-p95').textContent=fmtPrice(g['Precio Gasolina 95 E5']);
  document.getElementById('d-pd').textContent=fmtPrice(g['Precio Gasoleo A']);
  document.getElementById('d-muni').textContent=g['Municipio']||'—';
  document.getElementById('d-prov').textContent=g['Provincia']||'—';
  const distEl=document.getElementById('d-dist');
  if(userLocation){const{lat,lng}=coords(g);if(!isNaN(lat)&&!isNaN(lng)){distEl.textContent='📏 '+fmtDist(haversine(userLocation.lat,userLocation.lng,lat,lng));}}else distEl.textContent='';

  const{lat,lng}=coords(g);
  document.getElementById('btn-gmaps').onclick=()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`,'_blank');
  document.getElementById('btn-waze').onclick=()=>window.open(`https://waze.com/ul?ll=${lat},${lng}&navigate=yes`,'_blank');
  document.getElementById('btn-copy').onclick=()=>{
    navigator.clipboard?.writeText((g['Dirección']||'')+', '+(g['Municipio']||'')+', '+(g['Provincia']||'')).then(()=>{
      const b=document.getElementById('btn-copy');const old=b.innerHTML;
      b.innerHTML='<span class="nav-icon">✓</span>Copiado';
      setTimeout(()=>b.innerHTML=old,1500);
    });
  };

  document.getElementById('detail-panel').classList.add('open');
  if(selectedId&&selectedId!==g.IDEESS)refreshMarker(selectedId,false);
  selectedId=g.IDEESS;
  refreshMarker(selectedId,true);
  document.querySelectorAll('.gas-item').forEach(el=>el.classList.toggle('selected',el.dataset.id===g.IDEESS));
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  if(selectedId){refreshMarker(selectedId,false);selectedId=null;}
  document.querySelectorAll('.gas-item').forEach(el=>el.classList.remove('selected'));
}

// ── LIST ──────────────────────────────────────────────────────────────────
function renderList(list){
  const sorted=[...list];
  const{top95ids,topDids}=getTop4(list);

  if(currentSort==='dist'&&userLocation) sorted.sort((a,b)=>{const ca=coords(a),cb=coords(b);return haversine(userLocation.lat,userLocation.lng,ca.lat,ca.lng)-haversine(userLocation.lat,userLocation.lng,cb.lat,cb.lng);});
  else if(currentSort==='price95') sorted.sort((a,b)=>(parsePrice(a['Precio Gasolina 95 E5'])||99)-(parsePrice(b['Precio Gasolina 95 E5'])||99));
  else if(currentSort==='priceD')  sorted.sort((a,b)=>(parsePrice(a['Precio Gasoleo A'])||99)-(parsePrice(b['Precio Gasoleo A'])||99));
  else sorted.sort((a,b)=>(a['Rótulo']||'').localeCompare(b['Rótulo']||''));

  const frag=document.createDocumentFragment();
  sorted.forEach(g=>{
    const p95=parsePrice(g['Precio Gasolina 95 E5']), pD=parsePrice(g['Precio Gasoleo A']);
    const isTop95=top95ids.has(g.IDEESS), isTopD=topDids.has(g.IDEESS);
    let rankDot;
    if(isTop95&&isTopD) rankDot=`<div class="gas-rank" style="background:linear-gradient(135deg,var(--top95),var(--topD))">★</div>`;
    else if(isTop95) rankDot=`<div class="gas-rank" style="background:var(--top95)">95</div>`;
    else if(isTopD)  rankDot=`<div class="gas-rank" style="background:var(--topD)">D</div>`;
    else rankDot=`<div class="gas-rank" style="background:var(--surface3)"></div>`;

    let distHtml='';
    if(userLocation){const{lat,lng}=coords(g);if(!isNaN(lat)&&!isNaN(lng)){distHtml=`<div class="distance-badge">${fmtDist(haversine(userLocation.lat,userLocation.lng,lat,lng))}</div>`;}}

    const b95cls=isTop95?'top95':'p95', bDcls=isTopD?'topD':'pdiesel';
    const div=document.createElement('div');
    div.className='gas-item'+(g.IDEESS===selectedId?' selected':'');
    div.dataset.id=g.IDEESS;
    div.innerHTML=`${rankDot}<div class="gas-info"><div class="gas-name">${g['Rótulo']||'Sin nombre'}</div><div class="gas-addr">${g['Dirección']||''}${g['Municipio']?' · '+g['Municipio']:''}</div><div class="gas-prices">${p95?`<span class="price-badge ${b95cls}">${p95.toFixed(3)}€ 95</span>`:''}${pD?`<span class="price-badge ${bDcls}">${pD.toFixed(3)}€ D</span>`:''}</div></div>${distHtml}`;
    div.addEventListener('click',()=>{const m=markerMap[g.IDEESS];if(m){map.flyTo([m.lat,m.lng],15,{duration:.7});showDetail(g,m.marker);}});
    frag.appendChild(div);
  });
  const c=document.getElementById('gas-list');c.innerHTML='';c.appendChild(frag);
  document.getElementById('result-count').textContent=`${list.length} gasolineras`;
}

// ── FILTERS ───────────────────────────────────────────────────────────────
function applyFilters(){
  let list=[...allData];
  if(activeFilters.provincia) list=list.filter(g=>g['Provincia']===activeFilters.provincia);
  if(activeFilters.municipio) list=list.filter(g=>g['Municipio']===activeFilters.municipio);
  if(activeFilters.maxPrice95<2.49) list=list.filter(g=>{const p=parsePrice(g['Precio Gasolina 95 E5']);return!p||p<=activeFilters.maxPrice95;});
  if(radiusCenter&&radiusKm>0){
    list=list.filter(g=>{const{lat,lng}=coords(g);return!isNaN(lat)&&haversine(radiusCenter.lat,radiusCenter.lng,lat,lng)<=radiusKm;});
    drawCircle();
  }else removeCircle();
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(q) list=list.filter(g=>(g['Rótulo']||'').toLowerCase().includes(q)||(g['Municipio']||'').toLowerCase().includes(q)||(g['Dirección']||'').toLowerCase().includes(q)||(g['Provincia']||'').toLowerCase().includes(q));
  filtered=list;
  renderList(list);
  buildMarkers(list);
  setStatus('ok',`${list.length} gasolineras`);

  const hasFilters=activeFilters.provincia||activeFilters.municipio||activeFilters.maxPrice95<2.49||radiusCenter;
  document.getElementById('filter-dot').classList.toggle('show',!!hasFilters);
}

function drawCircle(){removeCircle();radiusCircle=L.circle([radiusCenter.lat,radiusCenter.lng],{radius:radiusKm*1000,color:'#e85d04',weight:1.5,opacity:.7,fillColor:'#e85d04',fillOpacity:.05}).addTo(map);}
function removeCircle(){if(radiusCircle){map.removeLayer(radiusCircle);radiusCircle=null;}}

function populateProvincias(){
  const provs=[...new Set(allData.map(g=>g['Provincia']).filter(Boolean))].sort();
  const opt=document.getElementById('prov-options');
  opt.innerHTML='<div class="cs-opt sel" data-val="">Todas</div>'+provs.map(p=>`<div class="cs-opt" data-val="${p}">${p}</div>`).join('');
  bindCsOptions(opt,'prov-trigger',v=>{activeFilters.provincia=v; populateMunicipios(v); document.getElementById('muni-trigger').textContent='Todos'; activeFilters.municipio='';});
}
function populateMunicipios(prov){
  const base=prov?allData.filter(g=>g['Provincia']===prov):allData;
  const munis=[...new Set(base.map(g=>g['Municipio']).filter(Boolean))].sort();
  const opt=document.getElementById('muni-options');
  opt.innerHTML='<div class="cs-opt sel" data-val="">Todos</div>'+munis.map(m=>`<div class="cs-opt" data-val="${m}">${m}</div>`).join('');
  bindCsOptions(opt,'muni-trigger',v=>{activeFilters.municipio=v;});
}

// ── CUSTOM SELECT logic ───────────────────────────────────────────────────
function bindCsOptions(optionsEl,triggerId,onSelect){
  optionsEl.querySelectorAll('.cs-opt').forEach(o=>{
    o.addEventListener('click',()=>{
      optionsEl.querySelectorAll('.cs-opt').forEach(x=>x.classList.remove('sel'));
      o.classList.add('sel');
      document.getElementById(triggerId).textContent=o.textContent;
      optionsEl.classList.remove('open');
      onSelect(o.dataset.val);
    });
  });
}
document.querySelectorAll('.cs-trigger').forEach(trigger=>{
  trigger.addEventListener('click',e=>{
    e.stopPropagation();
    const opts=trigger.nextElementSibling;
    document.querySelectorAll('.cs-options').forEach(o=>{if(o!==opts)o.classList.remove('open');});
    opts.classList.toggle('open');
  });
});
document.addEventListener('click',()=>{document.querySelectorAll('.cs-options').forEach(o=>o.classList.remove('open'));});

bindCsOptions(document.getElementById('sort-options'),'sort-trigger',v=>{currentSort=v;renderList(filtered);});

// ── DATA — descarga optimizada en segundo plano ───────────────────────────
async function loadData(){
  setStatus('loading','Cargando...');
  try{
    const cached=localStorage.getItem(CACHE_KEY), ts=parseInt(localStorage.getItem(CACHE_TS)||'0');
    if(cached&&Date.now()-ts<CACHE_TTL){
      allData=JSON.parse(cached);
      filterByUserArea();
      document.getElementById('loader').style.display='none';
      return; // No re-descarga si el caché tiene menos de 24h
    }
  }catch(e){}
  await fetchAPI(true);
}

async function fetchAPI(showLoader=false){
  setStatus('loading','Descargando datos...');
  if(showLoader)document.getElementById('loader-sub').textContent='Descargando precios (puede tardar unos segundos)...';
  try{
    const r=await fetch(API_URL);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const lista=data.ListaEESSPrecio;
    if(!lista?.length)throw new Error('Vacío');

    // Optimizamos: solo guardamos los campos que usamos, reduce tamaño en caché ~40%
    const optimized=lista.map(g=>({
      IDEESS:g.IDEESS, 'Rótulo':g['Rótulo'], 'Dirección':g['Dirección'],
      'Municipio':g['Municipio'], 'Provincia':g['Provincia'],
      'Latitud':g['Latitud'], 'Longitud (WGS84)':g['Longitud (WGS84)'],
      'Precio Gasolina 95 E5':g['Precio Gasolina 95 E5'], 'Precio Gasoleo A':g['Precio Gasoleo A'],
      'C.P.':g['C.P.']
    }));

    allData=optimized;
    try{localStorage.setItem(CACHE_KEY,JSON.stringify(optimized));localStorage.setItem(CACHE_TS,Date.now().toString());}catch(e){}
    filterByUserArea();
    populateProvincias();
    document.getElementById('loader').style.display='none';
  }catch(e){
    setStatus('error','Sin conexión');
    document.getElementById('loader-sub').textContent='Error: '+e.message;
    setTimeout(()=>document.getElementById('loader').style.display='none',2500);
  }
}

function filterByUserArea(){
  if(userLocation&&!radiusCenter){
    const localKm=radiusKm>0?radiusKm:LOAD_RADIUS_DEFAULT;
    const local=allData.filter(g=>{const{lat,lng}=coords(g);return!isNaN(lat)&&haversine(userLocation.lat,userLocation.lng,lat,lng)<=localKm;});
    filtered=local;renderList(local);buildMarkers(local);
    setStatus('ok',`${local.length} en ${localKm}km`);
  }else{
    applyFilters();
  }
  populateProvincias();
}

// ── GEOLOCATION ───────────────────────────────────────────────────────────
let userMarker=null;
function locateUser(cb){
  if(!navigator.geolocation){if(cb)cb(null);return;}
  setStatus('loading','Buscando posición...');
  navigator.geolocation.getCurrentPosition(pos=>{
    userLocation={lat:pos.coords.latitude,lng:pos.coords.longitude};
    if(userMarker)map.removeLayer(userMarker);
    userMarker=L.circleMarker([userLocation.lat,userLocation.lng],{radius:9,fillColor:'#4cc9f0',color:'#fff',weight:2.5,fillOpacity:.95}).addTo(map);
    if(cb)cb(userLocation);
    else{map.flyTo([userLocation.lat,userLocation.lng],13,{duration:.9});filterByUserArea();}
  },()=>{setStatus('error','Sin ubicación');if(cb)cb(null);},{enableHighAccuracy:true,timeout:8000});
}

// ── DRAG HANDLE ───────────────────────────────────────────────────────────
(function(){
  const bl=document.getElementById('bottom-list');
  const hb=document.getElementById('list-handle-bar');
  let startY,startH;
  function onStart(e){startY=(e.touches?e.touches[0]:e).clientY;startH=bl.offsetHeight;}
  function onMove(e){
    const y=(e.touches?e.touches[0]:e).clientY;
    const newH=Math.max(70,Math.min(window.innerHeight*.85,startH+(startY-y)));
    bl.style.height=newH+'px';
  }
  function onEnd(){
    const h=bl.offsetHeight, vh=window.innerHeight;
    if(h<vh*.18)bl.style.height='70px';
    else if(h>vh*.6)bl.style.height=Math.round(vh*.78)+'px';
    else bl.style.height='38vh';
  }
  hb.addEventListener('touchstart',onStart,{passive:true});
  hb.addEventListener('touchmove',onMove,{passive:true});
  hb.addEventListener('touchend',onEnd);
})();

// ── EVENTS ────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',e=>{
  document.getElementById('clear-search').style.display=e.target.value?'block':'none';
  applyFilters();
});
document.getElementById('clear-search').addEventListener('click',()=>{document.getElementById('search').value='';document.getElementById('clear-search').style.display='none';applyFilters();});
document.getElementById('detail-close').addEventListener('click',closeDetail);
document.getElementById('locate-btn').addEventListener('click',()=>locateUser());
document.getElementById('filter-btn').addEventListener('click',()=>document.getElementById('filters-panel').classList.add('open'));
document.getElementById('close-filters').addEventListener('click',()=>document.getElementById('filters-panel').classList.remove('open'));
document.getElementById('filters-panel').addEventListener('click',e=>{if(e.target.id==='filters-panel')document.getElementById('filters-panel').classList.remove('open');});
document.getElementById('max-price-95').addEventListener('input',e=>{const v=parseFloat(e.target.value);document.getElementById('max-price-val').textContent=v>=2.49?'Sin límite':v.toFixed(2)+'€';});
document.getElementById('radius-range').addEventListener('input',e=>{const v=parseInt(e.target.value);document.getElementById('radius-val').textContent=v===0?'Sin radio':v+' km';});
document.getElementById('set-center-btn').addEventListener('click',()=>{
  locateUser(loc=>{
    if(!loc)return;
    radiusCenter=loc;
    radiusKm=parseInt(document.getElementById('radius-range').value)||25;
    document.getElementById('radio-center-info').style.display='block';
    document.getElementById('radio-center-info').textContent=`Radio de ${radiusKm}km activo`;
    document.getElementById('clear-radius-btn').style.display='block';
    drawCircle();map.flyToBounds(radiusCircle.getBounds(),{padding:[20,20],duration:.7});
    applyFilters();
    document.getElementById('filters-panel').classList.remove('open');
  });
});
document.getElementById('clear-radius-btn').addEventListener('click',()=>{
  radiusCenter=null;radiusKm=0;
  document.getElementById('radius-range').value=0;document.getElementById('radius-val').textContent='Sin radio';
  document.getElementById('radio-center-info').style.display='none';document.getElementById('clear-radius-btn').style.display='none';
  removeCircle();filterByUserArea();
});
document.getElementById('apply-filters').addEventListener('click',()=>{
  activeFilters.maxPrice95=parseFloat(document.getElementById('max-price-95').value);
  radiusKm=parseInt(document.getElementById('radius-range').value)||0;
  document.getElementById('filters-panel').classList.remove('open');
  applyFilters();
});

// ── INIT ──────────────────────────────────────────────────────────────────
initMap();
locateUser(loc=>{
  if(loc) map.flyTo([loc.lat,loc.lng],13,{duration:.8});
  loadData();
});
setTimeout(()=>{if(allData.length===0)loadData();},5000);
</script>
